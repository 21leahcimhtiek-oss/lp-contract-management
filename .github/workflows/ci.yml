name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies (lockfile)
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Install dependencies (no lockfile)
        if: ${{ hashFiles('package.json') != '' && hashFiles('package-lock.json') == '' }}
        run: npm install

      - name: Lint
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run lint --if-present

      - name: Test
        if: ${{ hashFiles('package.json') != '' }}
        run: npm test --if-present

      - name: Build
        if: ${{ hashFiles('package.json') != '' }}
        run: npm run build --if-present

      - name: Static file checks
        run: |
          test -f README.md
          test -f index.html
          test -f vercel.json
